  <script>
    // ## Array Cardio Day 2

    const people = [
      { name: 'Wes', year: 1988 },
      { name: 'Kait', year: 1986 },
      { name: 'Irv', year: 1970 },
      { name: 'Lux', year: 2015 }
    ];

    const comments = [
      { text: 'Love this!', id: 523423 },
      { text: 'Super good', id: 823423 },
      { text: 'You are the best', id: 2039842 },
      { text: 'Ramen is my fav food ever', id: 123523 },
      { text: 'Nice Nice Nice!', id: 542328 }
    ];

    // Some and Every Checks
    // Array.prototype.some() // is at least one person 19 or older?
    const moreThan19 = people.some(person => {
      const age = 2022 - person.year
      return age >= 19
    });
    console.log('Is at least one person 19 or older?', moreThan19);
    // Array.prototype.every() // is everyone 19 or older?
    const isEveryoneOlder = people.every(person => {
      const age = 2022 - person.year
      return age >= 19
    });
    console.log('Is everyone 19 or older?', isEveryoneOlder);


    // Array.prototype.find()
    // Find is like filter, but instead returns just the one you are looking for
    // find the comment with the ID of 823423
    const specificComment = comments.find(comment => {
      return comment.id == 823423
    });
    console.log(specificComment);
